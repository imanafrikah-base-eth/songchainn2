<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Preconnect: warm DNS + TLS before JS runs -->
    <link rel="preconnect" href="https://wsjhbfmzbonxmxaaassu.supabase.co" crossorigin />
    <link rel="preconnect" href="https://auth.farcaster.xyz" crossorigin />
    <link rel="dns-prefetch" href="https://wsjhbfmzbonxmxaaassu.supabase.co" />
    <link rel="dns-prefetch" href="https://auth.farcaster.xyz" />
    <!-- Basic SEO -->
    <title>$ONGCHAINN</title>
    <meta name="description" content="$ONGCHAINN — Music streaming on Base & Farcaster. Discover, stream, and connect with artists." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="application-name" content="$ONGCHAINN" />

    <!-- Farcaster Mini App embed -->
    <meta name="fc:frame" content='{"version":"1","imageUrl":"https://songchainn.xyz/assets/splash.png","button":{"title":"Open $ongChainn","action":{"type":"launch_frame","name":"$ongChainn","url":"https://songchainn.xyz","splashImageUrl":"https://songchainn.xyz/assets/splash.png","splashBackgroundColor":"#1a0533"}}}' />

    <!-- Open Graph (Sharing Preview) -->
    <meta property="og:title" content="$ONGCHAINN" />
    <meta property="og:description" content="Music streaming on Base & Farcaster. Discover, stream, and connect with artists." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:url" content="https://songchainn.xyz" />
    <meta property="og:site_name" content="$ONGCHAINN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="$ONGCHAINN" />
    <meta name="twitter:description" content="Music streaming on Base & Farcaster. Discover, stream, and connect with artists." />
    <meta name="twitter:image" content="/favicon.png" />
    <meta name="twitter:site" content="@songchainn" />

    <script>
      (function () {
        var isDevHost =
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1" ||
          location.hostname === "0.0.0.0" ||
          location.port === "5173";
        if (!isDevHost) return;
        if (!("serviceWorker" in navigator)) return;
        var key = "songchainn_dev_sw_reset_done";
        if (sessionStorage.getItem(key) === "done") return;
        sessionStorage.setItem(key, "done");

        window.addEventListener("load", function () {
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              if (!regs.length) return false;
              return Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () { return true; });
            }),
            (typeof caches !== "undefined" && caches.keys ? caches.keys().then(function (keys) {
              if (!keys.length) return false;
              return Promise.all(keys.map(function (k) { return caches.delete(k); })).then(function () { return true; });
            }) : Promise.resolve(false))
          ]).catch(function () {});
        });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
